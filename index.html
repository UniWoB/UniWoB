<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniWoB — Academic Opportunities & Network</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#101626;--ink-soft:#39414F;--muted:#6E7686;--paper:#F6F7FB;--card:#FFFFFF;
    --line:#E7EAF1;--navy:#14213F;--navy-deep:#0D1730;--marigold:#C49A4D;--marigold-deep:#A87E33;
    --c-sch:#3C4F9E;--c-int:#13876B;--c-exc:#6B52C0;--c-con:#BE8A2A;--c-res:#BD3B4E;
    --shadow:0 1px 2px rgba(16,22,46,.05), 0 10px 30px rgba(16,22,46,.07);
    --shadow-lg:0 24px 60px rgba(16,22,46,.16);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--paper);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1160px;margin:0 auto;padding:0 24px}
  .mono{font-family:'Space Mono',monospace;letter-spacing:.04em}
  .serif{font-family:'Fraunces',serif}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none}
  :focus-visible{outline:3px solid var(--marigold);outline-offset:2px;border-radius:4px}

  .nav{position:sticky;top:0;z-index:40;background:rgba(244,246,251,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .nav-in{display:flex;align-items:center;justify-content:space-between;height:66px;gap:12px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:19px}
  .glyph{width:30px;height:30px;border-radius:8px;background:var(--navy);display:grid;place-items:center;color:#fff;font-family:'Space Mono',monospace;font-weight:700;font-size:15px;transform:rotate(-4deg)}
  .nav-links{display:flex;align-items:center;gap:16px;font-size:14.5px;font-weight:500}
  .nav-links a.lnk{color:var(--ink-soft);padding:4px 2px;border-bottom:2px solid transparent;white-space:nowrap}
  .nav-links a.lnk:hover{color:var(--ink)}
  .nav-links a.lnk.active{color:var(--navy);border-bottom-color:var(--marigold)}
  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:14.5px;padding:11px 20px;border-radius:10px;transition:transform .15s ease, box-shadow .15s ease, background .15s ease;text-align:center;justify-content:center}
  .btn-primary{background:var(--navy);color:#fff}.btn-primary:hover{background:var(--navy-deep);transform:translateY(-1px)}
  .btn-gold{background:var(--marigold);color:#1B1404}.btn-gold:hover{background:var(--marigold-deep);transform:translateY(-1px)}
  .btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}.btn-ghost:hover{border-color:#c9cfde;transform:translateY(-1px)}
  .btn-sm{padding:7px 14px;font-size:13px;border-radius:8px}
  .nav .btn{padding:9px 16px}
  .saved-pill{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;color:var(--ink-soft);background:#fff;border:1px solid var(--line);padding:8px 13px;border-radius:999px;transition:border-color .15s}
  .saved-pill:hover{border-color:#c9cfde}
  .saved-pill svg{fill:none;stroke:var(--c-res);stroke-width:2}.saved-pill.has svg{fill:var(--c-res)}
  .avatar{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:14px;color:#fff}
  @media(max-width:1000px){.nav-links a.lnk{display:none}}
  @media(max-width:560px){.nav-links .sign-cta{display:none}}
  .btn-line{background:none;color:var(--ink-soft);font-weight:600;font-size:14.5px;padding:8px 4px}.btn-line:hover{color:var(--ink)}

  .page{animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .section{padding:56px 0}
  .kicker{font-size:12.5px;text-transform:uppercase;color:var(--marigold-deep);margin-bottom:10px}
  .sec-head h2{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(26px,4vw,38px);letter-spacing:-.01em}
  .sec-head p{color:var(--muted);font-size:15px;max-width:48ch;margin-top:8px}
  .breadcrumb{font-size:13px;color:var(--muted);padding:22px 0 0}.breadcrumb a:hover{color:var(--ink)}

  .hero{position:relative;overflow:hidden;background:radial-gradient(120% 120% at 88% -10%, #1f2d57 0%, var(--navy) 42%, var(--navy-deep) 100%);color:#fff;padding:70px 0 80px}
  .hero:before{content:"";position:absolute;inset:0;opacity:.4;background-image:radial-gradient(circle, rgba(255,255,255,.07) 1px, transparent 1.4px);background-size:26px 26px;mask-image:linear-gradient(180deg,#000,transparent 78%)}
  .hero-in{position:relative}
  .eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:12.5px;text-transform:uppercase;color:#AEB8E6;margin-bottom:22px}
  .eyebrow b{color:var(--marigold)}
  .hero h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(36px,6vw,62px);line-height:1.02;letter-spacing:-.015em;max-width:16ch}
  .hero h1 em{font-style:italic;color:var(--marigold)}
  .hero .lead{margin-top:22px;font-size:clamp(16px,2.1vw,19px);color:#D4DAF4;max-width:56ch}
  .hero-cta{margin-top:32px;display:flex;flex-wrap:wrap;gap:14px}
  .hero-stats{margin-top:42px;display:flex;flex-wrap:wrap;gap:14px}
  .stat{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:14px 18px;min-width:112px}
  .stat .num{font-family:'Fraunces',serif;font-size:28px;font-weight:600;line-height:1}
  .stat .lbl{font-size:12px;color:#AEB8E6;margin-top:6px}

  .how{background:#fff;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .how-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:32px}
  @media(max-width:760px){.how-grid{grid-template-columns:1fr}}
  .step{padding:26px 24px;border:1px solid var(--line);border-radius:16px;background:var(--paper)}
  .step .no{font-family:'Space Mono',monospace;font-size:13px;color:var(--marigold-deep);font-weight:700}
  .step .ic{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;margin:14px 0 16px;background:#EEF1FB}
  .step h3{font-family:'Fraunces',serif;font-weight:600;font-size:20px;margin-bottom:7px}
  .step p{font-size:14px;color:var(--muted)}

  .controls{margin:28px 0 8px;display:flex;flex-direction:column;gap:16px}
  .searchbar{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 16px;box-shadow:var(--shadow)}
  .searchbar svg{flex:none}
  .searchbar input{border:none;outline:none;width:100%;font-size:15.5px;color:var(--ink);background:transparent}
  .filter-row{display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{font-size:13.5px;font-weight:600;padding:8px 15px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--ink-soft);transition:all .15s ease}
  .chip:hover{border-color:#c9cfde}.chip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .chip .ct{opacity:.6;font-weight:700;margin-left:3px}
  .right-controls{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .ctl{display:flex;align-items:center;gap:8px}.ctl label{font-size:13px;color:var(--muted);font-weight:500}
  select{font-family:inherit;font-size:14px;font-weight:500;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 14px;cursor:pointer}
  .meta-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:8px 2px 0}
  .count-note{font-size:13px;color:var(--muted)}.count-note b{color:var(--ink)}
  .clear-btn{font-size:13px;color:var(--navy);font-weight:600;background:none;text-decoration:underline;display:none}.clear-btn.show{display:inline}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(308px,1fr));gap:18px;margin-top:22px}
  .oppcard{position:relative;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;display:flex;flex-direction:column;box-shadow:var(--shadow);transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease}
  .oppcard:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:#d6dcec}
  .oc-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .tag{font-size:11.5px;font-weight:700;letter-spacing:.02em;padding:5px 11px;border-radius:999px;color:#fff}
  .save{width:34px;height:34px;border-radius:9px;background:#F4F6FB;display:grid;place-items:center;transition:background .15s, transform .15s}
  .save:hover{background:#EAEEF8}.save:active{transform:scale(.9)}
  .save svg{fill:none;stroke:var(--muted);stroke-width:2}.save.on svg{fill:var(--c-res);stroke:var(--c-res)}
  .oc-code{font-size:11px;color:var(--muted);margin-top:13px}
  .oc-title{font-family:'Fraunces',serif;font-weight:600;font-size:21px;line-height:1.18;margin:4px 0 6px;letter-spacing:-.01em}
  .oc-loc{display:flex;align-items:center;gap:7px;font-size:13.5px;color:var(--ink-soft);font-weight:500}
  .oc-desc{font-size:14px;color:var(--muted);margin-top:12px;flex:1}
  .oc-foot{display:flex;align-items:center;justify-content:space-between;margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}
  .deadline{font-size:12px;color:var(--ink-soft)}
  .deadline .dl-lbl{color:var(--muted);display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
  .deadline.soon{color:var(--c-res)}
  .view-btn{font-size:13.5px;font-weight:600;color:var(--navy);background:#EEF1FB;padding:9px 15px;border-radius:9px;transition:background .15s ease}
  .view-btn:hover{background:#E1E7FA}
  .empty{grid-column:1/-1;text-align:center;padding:56px 20px;color:var(--muted)}
  .empty .serif{font-size:22px;color:var(--ink-soft);display:block;margin-bottom:8px}

  .detail-hd{background:var(--navy);color:#fff;border-radius:20px;padding:34px 36px;position:relative;overflow:hidden;margin-top:14px}
  .detail-hd:before{content:"";position:absolute;inset:0;opacity:.4;background-image:radial-gradient(circle, rgba(255,255,255,.07) 1px, transparent 1.4px);background-size:24px 24px;mask-image:linear-gradient(110deg,transparent 50%,#000)}
  .detail-hd .inner{position:relative}
  .detail-hd h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(26px,4vw,38px);line-height:1.1;letter-spacing:-.01em;margin:14px 0 0;max-width:22ch}
  .detail-meta{display:flex;flex-wrap:wrap;gap:18px;margin-top:18px;font-size:14px;color:#C8D0F2}
  .detail-meta span{display:flex;align-items:center;gap:7px}
  .detail-body{display:grid;grid-template-columns:1.6fr 1fr;gap:28px;margin-top:28px;align-items:start}
  @media(max-width:820px){.detail-body{grid-template-columns:1fr}}
  .panel{background:#fff;border:1px solid var(--line);border-radius:16px;padding:26px;box-shadow:var(--shadow)}
  .panel+.panel{margin-top:18px}
  .panel h4{font-size:12.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--marigold-deep);margin-bottom:14px}
  .panel p{font-size:15px;color:var(--ink-soft)}
  .ilist{list-style:none;display:flex;flex-direction:column;gap:11px}
  .ilist li{display:flex;gap:11px;font-size:14.5px;color:var(--ink-soft)}.ilist li svg{flex:none;margin-top:3px}
  .apply-card{position:sticky;top:84px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:24px;box-shadow:var(--shadow)}
  .apply-card .dl{font-size:13px;color:var(--muted);margin-bottom:4px}
  .apply-card .big-dl{font-family:'Fraunces',serif;font-size:24px;font-weight:600;margin-bottom:18px}
  .apply-card .big-dl.soon{color:var(--c-res)}
  .apply-card .btn{width:100%;margin-bottom:10px;padding:13px}
  .apply-card .save-row{width:100%;justify-content:center;display:flex;align-items:center;gap:9px;font-weight:600;font-size:14px;color:var(--ink-soft);border:1px solid var(--line);border-radius:10px;padding:11px;background:#fff;transition:border-color .15s}
  .apply-card .save-row:hover{border-color:#c9cfde}
  .apply-card .save-row svg{fill:none;stroke:var(--c-res);stroke-width:2}.apply-card .save-row.on svg{fill:var(--c-res)}
  .demo-note{margin-top:14px;font-size:12px;color:var(--muted);text-align:center}

  .split{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}
  @media(max-width:840px){.split{grid-template-columns:1fr;gap:30px}}
  .form-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:28px;box-shadow:var(--shadow-lg)}
  .form-card h3{font-family:'Fraunces',serif;font-weight:600;font-size:22px;margin-bottom:4px}
  .form-card .sub{font-size:13.5px;color:var(--muted);margin-bottom:20px}
  .field{margin-bottom:15px}
  .field.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;font-size:15px;padding:12px 14px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);transition:border-color .15s;font-family:inherit}
  .field textarea{resize:vertical;min-height:84px}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--navy)}
  .field input.err,.field select.err,.field textarea.err{border-color:var(--c-res);background:#FFF5F5}
  .form-card .btn-gold,.form-card .btn-primary{width:100%;margin-top:6px;padding:14px}
  .feat-list{list-style:none;display:flex;flex-direction:column;gap:14px;margin-top:24px}
  .feat-list li{display:flex;gap:12px;font-size:15px;color:var(--ink-soft)}
  .feat-list li .fi{width:38px;height:38px;border-radius:10px;background:#EEF1FB;display:grid;place-items:center;flex:none}
  .success{text-align:center;padding:18px 6px}
  .success .ok{width:58px;height:58px;border-radius:50%;background:#E7F8F0;display:grid;place-items:center;margin:0 auto 16px}
  .success h3{font-family:'Fraunces',serif;font-weight:600;font-size:24px;margin-bottom:8px}
  .success p{font-size:14.5px;color:var(--muted)}
  .success .actions{margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

  .waitlist{background:var(--navy);color:#fff;position:relative;overflow:hidden}
  .waitlist:before{content:"";position:absolute;inset:0;opacity:.32;background-image:radial-gradient(circle, rgba(255,255,255,.07) 1px, transparent 1.4px);background-size:26px 26px}
  .wl-in{position:relative}
  .wl-left h2{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(26px,4vw,40px);line-height:1.05;letter-spacing:-.01em}
  .wl-left p{color:#CDD4F2;margin-top:16px;font-size:16px;max-width:42ch}
  .wl-badge{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:8px 16px;font-size:13.5px;margin-top:24px}
  .wl-badge .dot{width:8px;height:8px;border-radius:50%;background:#46B98C;box-shadow:0 0 0 4px rgba(70,185,140,.25)}
  .wl-badge b{font-family:'Space Mono',monospace}

  .who-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:30px}
  @media(max-width:820px){.who-grid{grid-template-columns:1fr 1fr}}
  @media(max-width:540px){.who-grid{grid-template-columns:1fr}}
  .who{background:#fff;border:1px solid var(--line);border-radius:14px;padding:22px}
  .who .wic{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;margin-bottom:14px;color:#fff}
  .who h4{font-family:'Fraunces',serif;font-weight:600;font-size:18px;margin-bottom:6px}
  .who p{font-size:13.5px;color:var(--muted)}

  /* ---- NETWORK / FEED ---- */
  .feed-layout{display:grid;grid-template-columns:260px 1fr 290px;gap:22px;align-items:start;margin-top:8px}
  @media(max-width:980px){.feed-layout{grid-template-columns:1fr 290px}.feed-layout .col-left{display:none}}
  @media(max-width:760px){.feed-layout{grid-template-columns:1fr}.feed-layout .col-right{display:none}}
  .ncard{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
  .sticky{position:sticky;top:84px}
  .me-card{overflow:hidden}
  .me-cover{height:62px;background:radial-gradient(120% 160% at 80% -20%,#243363,var(--navy))}
  .me-body{padding:0 18px 18px;text-align:center}
  .me-av{width:64px;height:64px;border-radius:50%;margin:-32px auto 10px;border:3px solid #fff;display:grid;place-items:center;color:#fff;font-weight:700;font-size:22px;font-family:'Fraunces',serif}
  .me-name{font-family:'Fraunces',serif;font-weight:600;font-size:18px}
  .me-role{font-size:12.5px;color:var(--muted);margin-top:3px}
  .me-stats{display:flex;border-top:1px solid var(--line);margin-top:16px}
  .me-stats div{flex:1;padding:12px 6px}.me-stats div+div{border-left:1px solid var(--line)}
  .me-stats .v{font-weight:700;font-size:16px;color:var(--navy)}
  .me-stats .k{font-size:11px;color:var(--muted)}
  .me-link{display:block;padding:13px;text-align:center;font-size:13.5px;font-weight:600;color:var(--navy);border-top:1px solid var(--line)}

  .composer{padding:16px 18px}
  .composer .crow{display:flex;gap:12px;align-items:flex-start}
  .composer textarea{flex:1;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-family:inherit;font-size:14.5px;resize:vertical;min-height:48px;outline:none}
  .composer textarea:focus{border-color:var(--navy)}
  .composer .cfoot{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-left:54px}
  .composer .hint{font-size:12px;color:var(--muted)}

  .post{padding:18px 20px;margin-top:18px}
  .post-hd{display:flex;gap:12px;align-items:flex-start}
  .post-hd .meta{flex:1;min-width:0}
  .post-hd .nm{font-weight:700;font-size:14.5px;color:var(--ink)}
  .post-hd .nm:hover{color:var(--navy)}
  .post-hd .badge-uni{font-size:10px;font-weight:700;color:#fff;background:var(--c-exc);padding:1px 7px;border-radius:6px;margin-left:6px;vertical-align:middle}
  .post-hd .rl{font-size:12.5px;color:var(--muted)}
  .post-hd .tm{font-size:11.5px;color:var(--muted);margin-top:2px}
  .post-body{font-size:14.5px;color:var(--ink-soft);margin:13px 0 0;white-space:pre-wrap}
  .post-opp{margin-top:14px;border:1px solid var(--line);border-radius:12px;padding:13px 15px;display:flex;align-items:center;gap:12px;transition:border-color .15s,background .15s}
  .post-opp:hover{border-color:#cdd5ea;background:#FAFBFE}
  .post-opp .po-tag{font-size:10.5px;font-weight:700;color:#fff;padding:3px 9px;border-radius:999px;flex:none}
  .post-opp .po-t{font-weight:600;font-size:14px;color:var(--ink)}
  .post-opp .po-s{font-size:12px;color:var(--muted)}
  .post-opp .po-go{margin-left:auto;font-size:13px;font-weight:600;color:var(--navy);flex:none}
  .post-actions{display:flex;gap:6px;margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
  .pa-btn{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--muted);background:none;padding:7px 12px;border-radius:8px;transition:background .15s,color .15s}
  .pa-btn:hover{background:#F4F6FB;color:var(--ink-soft)}
  .pa-btn.liked{color:var(--c-res)}.pa-btn.liked svg{fill:var(--c-res);stroke:var(--c-res)}
  .pa-btn svg{fill:none;stroke:currentColor;stroke-width:2}

  .rail{padding:18px}
  .rail h4{font-size:12.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:14px}
  .sugg{display:flex;align-items:center;gap:11px;padding:10px 0}
  .sugg+.sugg{border-top:1px solid var(--line)}
  .sugg .meta{flex:1;min-width:0}
  .sugg .nm{font-weight:600;font-size:13.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sugg .nm:hover{color:var(--navy)}
  .sugg .rl{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    <div class="grid" id="grid"></div>
  </section></div>`;
  const chipsEl=document.getElementById('chips');
  const catCount=c=>c==='All'?DATA.length:DATA.filter(d=>d.cat===c).length;
  ['All',...Object.keys(CAT)].forEach(c=>{
    const b=document.createElement('button');
    b.className='chip'+((board.cat===c&&!board.savedOnly)?' active':'');b.dataset.cat=c;b.setAttribute('role','tab');
    b.innerHTML=c+` <span class="ct">${catCount(c)}</span>`;
    b.onclick=()=>{board.cat=c;board.savedOnly=false;[...chipsEl.children].forEach(x=>x.classList.toggle('active',x.dataset.cat===c));renderGrid();};
    chipsEl.appendChild(b);
  });
  const countryEl=document.getElementById('country');
  [...new Set(DATA.map(d=>d.country))].sort().forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;if(board.country===c)o.selected=true;countryEl.appendChild(o);});
  countryEl.onchange=e=>{board.country=e.target.value;renderGrid();};
  const sortEl=document.getElementById('sort');sortEl.value=board.sort;sortEl.onchange=e=>{board.sort=e.target.value;renderGrid();};
  const searchEl=document.getElementById('search');searchEl.value=board.q;searchEl.oninput=e=>{board.q=e.target.value.toLowerCase().trim();renderGrid();};
  document.getElementById('clear-btn').onclick=()=>{board={q:'',cat:'All',country:'all',sort:'deadline',savedOnly:false};pageBoard();};
  renderGrid();
}
function renderGrid(){
  const grid=document.getElementById('grid');if(!grid)return;
  let list=DATA.filter(d=>{
    if(board.savedOnly&&!saved.has(d.n))return false;
    const mc=board.cat==='All'||d.cat===board.cat;
    const mco=board.country==='all'||d.country===board.country;
    const mq=!board.q||(d.name+d.desc+d.country+d.cat).toLowerCase().includes(board.q);
    return mc&&mco&&mq;
  });
  list.sort((a,b)=>board.sort==='name'?a.name.localeCompare(b.name):new Date(a.deadline)-new Date(b.deadline));
  const rc=document.getElementById('result-count');if(rc)rc.textContent=list.length;
  const filtered=board.q||board.cat!=='All'||board.country!=='all'||board.savedOnly;
  const cb=document.getElementById('clear-btn');if(cb)cb.classList.toggle('show',filtered);
  grid.innerHTML=list.length?list.map(cardHTML).join(''):`<div class="empty"><span class="serif">${board.savedOnly?'No saved opportunities yet.':'No opportunities match yet.'}</span>${board.savedOnly?'Tap the heart on any card to save it here.':'Try clearing the search or choosing “All”.'}</div>`;
}

function pageSignin(){
  app.innerHTML=`<div class="page"><section class="section wrap" style="max-width:460px;margin:0 auto">
    <div class="form-card" style="margin-top:20px">
      <h3>Sign in to UniWoB</h3><p class="sub">Access your saved opportunities, network and waitlist status.</p>
      <div class="field"><label for="si-email">Email</label><input id="si-email" type="email" placeholder="you@university.edu"></div>
      <div class="field"><label for="si-pass">Password</label><input id="si-pass" type="password" placeholder="••••••••"></div>
      <button class="btn btn-primary" id="si-go">Continue →</button>
      <p class="sub" style="text-align:center;margin:18px 0 0">New here? <a href="#/about" style="color:var(--navy);font-weight:600">Learn more</a> or <a href="#/" style="color:var(--navy);font-weight:600">join the waitlist</a>.</p>
      <div style="margin-top:16px;font-size:12px;color:var(--muted);background:#FBF6EC;border:1px solid #F0E2C4;border-radius:9px;padding:10px 13px;text-align:center">🔒 Demo only — no real account is created or stored.</div>
    </div></section></div>`;
  document.getElementById('si-go').onclick=()=>{
    const email=document.getElementById('si-email');
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email.value)){email.classList.add('err');return;}
    const namePart=email.value.split('@')[0].replace(/[._]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    auth={in:true,name:namePart,email:email.value};renderAuthSlot();location.hash='#/account';
  };
}

function pageAccount(){
  if(!auth.in){location.hash='#/signin';return;}
  const savedList=DATA.filter(d=>saved.has(d.n));
  const initials=initialsOf(auth.name);
  app.innerHTML=`<div class="page"><section class="section wrap">
    <div class="dash-hd"><div class="av">${esc(initials)}</div><div style="flex:1"><h1>Welcome back, ${esc(auth.name.split(' ')[0])}</h1><p>${esc(auth.email||'UniWoB member')}</p></div><button class="signout" id="signout">Sign out</button></div>
    <div class="dash-stats">
      <div class="dstat"><div class="n">${savedList.length}</div><div class="l">Saved opportunities</div></div>
      <div class="dstat"><div class="n">${connected.size}</div><div class="l">Connections</div></div>
      <div class="dstat"><div class="n">${following.size}</div><div class="l">Universities followed</div></div>
      <div class="dstat"><div class="n">✓</div><div class="l">On the waitlist</div></div>
    </div>
    <div class="sec-head" style="margin-top:30px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px"><div><div class="kicker mono">Your shortlist</div><h2>Saved opportunities</h2></div><a class="btn-line" href="#/network">Go to network →</a></div>
    ${savedList.length?`<div class="grid">${savedList.map(cardHTML).join('')}</div>`:`<div class="empty" style="border:1px dashed var(--line);border-radius:16px;margin-top:20px"><span class="serif">Nothing saved yet.</span>Browse the board and tap the heart to build your shortlist. <br><a class="btn btn-primary" style="margin-top:16px" href="#/opportunities">Explore opportunities →</a></div>`}
  </section></div>`;
  window.scrollTo(0,0);
  document.getElementById('signout').onclick=()=>{auth={in:false,name:'',email:''};renderAuthSlot();location.hash='#/';};
}

/* ============ NAV / DELEGATION / ROUTER ============ */
function renderAuthSlot(){
  const slot=document.getElementById('auth-slot');
  if(auth.in){
    slot.innerHTML=`<a href="#/account" title="My account" aria-label="My account"><span class="avatar" style="background:var(--marigold);color:#241a00">${esc(initialsOf(auth.name))}</span></a>`;
  }else{
    slot.innerHTML=`<button class="btn-line sign-cta" id="nav-signin">Sign in</button> <a href="#/opportunities" class="btn btn-primary">Explore</a>`;
    const b=document.getElementById('nav-signin');if(b)b.onclick=()=>location.hash='#/signin';
  }
}
function updateSaved(){
  const c=document.getElementById('saved-count');if(c)c.textContent=saved.size;
  document.getElementById('saved-pill').classList.toggle('has',saved.size>0);
}

app.addEventListener('click',e=>{
  const sv=e.target.closest('[data-save]');
  if(sv){const id=+sv.dataset.save;if(saved.has(id))saved.delete(id);else saved.add(id);sv.classList.toggle('on',saved.has(id));sv.setAttribute('aria-pressed',saved.has(id));updateSaved();return;}
  const cn=e.target.closest('[data-connect]');
  if(cn){const id=cn.dataset.connect;if(connected.has(id))connected.delete(id);else connected.add(id);const on=connected.has(id);cn.classList.toggle('on',on);if(cn.id==='prof-action'){cn.textContent=on?'Connected ✓':'+ Connect';cn.className='btn '+(on?'btn-ghost':'btn-primary')+' btn-sm';cn.dataset.connect=id;}else cn.textContent=on?'Connected':'Connect';const mc=document.getElementById('me-conn');if(mc)mc.textContent=connected.size;return;}
  const fl=e.target.closest('[data-follow]');
  if(fl){const id=fl.dataset.follow;if(following.has(id))following.delete(id);else following.add(id);const on=following.has(id);fl.classList.toggle('on',on);if(fl.id==='prof-action'){fl.textContent=on?'Following':'+ Follow';fl.className='btn '+(on?'btn-ghost':'btn-primary')+' btn-sm';fl.dataset.follow=id;}else fl.textContent=on?'Following':'Follow';const mf=document.getElementById('me-foll');if(mf)mf.textContent=following.size;return;}
  const lk=e.target.closest('[data-like]');
  if(lk){const i=+lk.dataset.like;if(liked.has(i))liked.delete(i);else liked.add(i);lk.classList.toggle('liked',liked.has(i));const cnt=lk.querySelector('[data-likecount]');cnt.textContent=POSTS[i].likes+(liked.has(i)?1:0);return;}
});
document.getElementById('saved-pill').onclick=()=>{
  if(!saved.size){location.hash='#/opportunities';return;}
  board={q:'',cat:'All',country:'all',sort:'deadline',savedOnly:true};
  if(location.hash.replace(/^#\/?/,'').split('/')[0]==='opportunities'){pageBoard();}else{location.hash='#/opportunities';}
};

function setActiveNav(route){document.querySelectorAll('.nav-links a.lnk').forEach(a=>a.classList.toggle('active',a.dataset.route===route));}
function router(){
  const h=location.hash.replace(/^#\/?/,'');const [route,param]=h.split('/');const r=route||'home';
  if(r==='home'){pageHome();setActiveNav('');}
  else if(r==='opportunities'){pageBoard();setActiveNav('opportunities');}
  else if(r==='opportunity'){pageDetail(+param);setActiveNav('opportunities');}
  else if(r==='network'){pageNetwork();setActiveNav('network');}
  else if(r==='profile'){pageProfile(param);setActiveNav('network');}
  else if(r==='universities'){pageUniversities();setActiveNav('universities');}
  else if(r==='about'){pageAbout();setActiveNav('about');}
  else if(r==='signin'){pageSignin();setActiveNav('');}
  else if(r==='account'){pageAccount();setActiveNav('');}
  else{pageHome();setActiveNav('');}
  if(['home','opportunities','universities','about','signin'].includes(r))window.scrollTo(0,0);
}
window.addEventListener('hashchange',router);
renderAuthSlot();updateSaved();router();
</script>
